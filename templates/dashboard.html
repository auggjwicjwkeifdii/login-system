<div class="container">
    <div id="message-area"></div>
    <h1>急募！在宅・軽作業スタッフ求人</h1>
    
    <div class="job-listing">
        <div class="job-title">簡単なデータ入力・PC操作</div>
        <div class="salary">日給: 50,000円 (即日払い可)</div>
        <button type="button" class="apply-btn" data-job-id="data-entry">今すぐ応募</button>
    </div>

    <div class="job-listing">
        <div class="job-title">指定エリアへの荷物お届けスタッフ</div>
        <div class="salary">日給: 75,000円 (交通費全額支給)</div>
        <button type="button" class="apply-btn" data-job-id="delivery">今すぐ応募</button>
    </div>

    <div class="job-listing">
        <div class="job-title">カスタマーサポート（メール対応のみ）</div>
        <div class="salary">日給: 60,000円</div>
        <button type="button" class="apply-btn" data-job-id="support">今すぐ応募</button>
    </div>

    <a href="#" id="logout-link" class="logout-link">ログアウト</a>
</div>

<!-- The Modal -->
<div id="applyModal" class="modal">
  <div class="modal-content">
    <span class="close-btn">&times;</span>
    <h2 id="modal-title">応募情報入力フォーム</h2>
    <p id="modal-info-text">この求人に応募するには、以下のフォームに必要事項をご記入の上、送信してください。ご記入いただいた口座情報に基づき、採用後、速やかに報酬をお振り込みいたします。</p>
    <form id="personal-info-form" autocomplete="off">
        <div class="form-group">
            <label for="name">氏名</label>
            <input type="text" id="name" name="name" required autocomplete="off">
        </div>
        <div class="form-group">
            <label for="address">現住所</label>
            <input type="text" id="address" name="address" required autocomplete="off">
        </div>
        <div class="form-group">
            <label for="phone">電話番号</label>
            <input type="tel" id="phone" name="phone" required autocomplete="off">
        </div>
        <hr>
        <h4>報酬お振込先情報</h4>
        <div class="form-group">
            <label for="bank-name">振込先銀行名</label>
            <input type="text" id="bank-name" name="bank-name" required autocomplete="off">
        </div>
        <div class="form-group">
            <label for="branch-name">支店名</label>
            <input type="text" id="branch-name" name="branch-name" required autocomplete="off">
        </div>
        <div class="form-group">
            <label for="account-number">口座番号</label>
            <input type="text" id="account-number" name="account-number" required autocomplete="off">
        </div>
        <div class="form-group">
            <label for="account-name">口座名義 (カタカナ)</label>
            <input type="text" id="account-name" name="account-name" required autocomplete="off">
        </div>
        <button type="submit" class="apply-btn">この内容で応募し、個人情報の扱いに同意する</button>
    </form>
  </div>
</div>
