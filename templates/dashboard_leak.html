<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>System Alert</title>
    <!-- Typed.jsライブラリをCDNから読み込みます -->
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: #e6e6e6; 
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
        }
        .terminal {
            background-color: #000;
            color: #0f0;
            padding: 15px;
            height: 400px;
            overflow-y: scroll;
            border: 1px solid #333;
            border-radius: 5px;
            font-size: 1.1em;
        }
        .typed-cursor {
            color: #0f0;
            animation: blink 0.7s infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        h1, h2, p {
            color: red;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>緊急警告</h2>
    <h1>システムへの不正侵入を検知</h1>
    <p><strong>5分以内に</strong>下記のセキュリティダイヤルにご連絡ください。システムが完全に破壊されます。</p>
    <p>緊急セキュリティダイヤル: <strong>01-2345-6789</strong></p>

    <div id="progress-container" style="width: 100%; background-color: #ddd; margin-bottom: 15px;">
      <div id="progress-bar" style="width: 0%; height: 30px; background-color: red; text-align: center; color: white;"></div>
    </div>

    <!-- Typed.jsがテキストを打ち込むためのターミナル風エリア -->
    <div class="terminal">
        <span id="typed"></span>
    </div>

    <!-- ログアウト用の非表示リンク -->
    <a href="#" id="logout-link" style="display: none;">ログアウト</a>

<script>
    // --- 1. Typed.jsの初期化と設定 ---
    const typed = new Typed('#typed', {
        // ここに表示したいハッキングコマンドのシナリオを記述します。
        // `^1000` は1秒待機、`^300`は0.3秒待機を意味します。
        strings: [
            'root@kali:~# ./breach.sh^500\n' +
            '> Initiating connection to target IP: 192.168.1.101...^500 OK\n' +
            '> Exploiting vulnerability CVE-2023-4567...^1000 OK\n' +
            '> Bypassing firewall...^300 OK\n' +
            '> Gaining root access...^1500 <strong style="color: yellow;">ROOT ACCESS GRANTED</strong>\n' +
            'root@victim:~# ls -l /home/^500\n' +
            '-rw-r--r-- 1 user user 1024 Jan 1 12:30 secret_notes.txt\n' +
            'drwxr-xr-x 2 user user 4096 Dec 25 18:00 project_files\n' +
            'root@victim:~# cat /etc/shadow^800\n' +
            'root:$6$....:18211:0:99999:7:::<br>' +
            'daemon:*:18211:0:99999:7:::<br>' +
            'user:$6$....:18212:0:99999:7:::<br>' +
            'root@victim:~# find / -name "*pass*"^1200\n' +
            '/var/log/app/db_pass.log\n' +
            '/home/user/documents/old_passwords.txt\n' +
            'root@victim:~# <strong style="color: red;">Initiating data exfiltration...</strong>^1000\n' +
            '> Compressing all user data... (archive.tar.gz)^1500\n' +
            '> Transferring archive.tar.gz to remote server... 25%^500... 50%^500... 75%^500... <strong style="color: lightgreen;">COMPLETE</strong>\n' +
            'root@victim:~# <strong style="color: red;">Mission complete. Covering tracks.</strong>^800\n' +
            'root@victim:~# history -c^500\n' +
            'root@victim:~# rm -rf /tmp/*^500\n' +
            'root@victim:~# <strong style="color: red; font-size: 1.2em;">INITIATING SELF-DESTRUCT SEQUENCE...</strong>'
        ],
        typeSpeed: 40,      // タイピングの速度
        backSpeed: 0,       // バックスペースの速度
        smartBackspace: true, // スマートバックスペース
        loop: false,        // ループしない
        showCursor: true,   // カーソルを表示
        cursorChar: '_',    // カーソルの文字
        contentType: 'html', // HTMLとして解釈させる
    });

    // --- 2. プログレスバーの制御 ---
    const progressBar = document.getElementById('progress-bar');
    const logoutLink = document.getElementById('logout-link');
    const duration = 300 * 1000; // 5分
    const startTime = Date.now();

    const progressInterval = setInterval(() => {
        const elapsedTime = Date.now() - startTime;
        const percentage = Math.min((elapsedTime / duration) * 100, 100);
        progressBar.style.width = percentage + '%';
        progressBar.textContent = Math.floor(percentage) + '%';

        if (elapsedTime >= duration) {
            clearInterval(progressInterval);
            // 5分経ったらログアウト処理（ここは元のまま）
            if(logoutLink) logoutLink.click(); 
        }
    }, 100);

</script>

</body>
</html>
